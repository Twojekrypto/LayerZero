name: Daily Full Holder Scan

on:
  schedule:
    # Run twice daily: 06:00 UTC (07:00 CET) and 18:00 UTC (19:00 CET)
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  full-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch holder data from Etherscan + Alchemy fallback
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: python fetch_holders.py

      - name: Merge with existing data (preserve labels)
        run: python update_data.py

      - name: Auto-detect fresh wallets (<30 days old)
        continue-on-error: true
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python detect_fresh.py

      - name: Restore flow cache
        uses: actions/cache@v4
        with:
          path: flow_cache.json
          key: flow-cache-v1
          restore-keys: flow-cache-

      - name: Generate real flow data from on-chain transfers
        continue-on-error: true
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python generate_flows.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet zro_data.json holders_multichain.json scan_state.json fresh_cache.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zro_data.json holders_multichain.json scan_state.json fresh_cache.json
          git commit -m "📊 Daily holder scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin master
          git push
