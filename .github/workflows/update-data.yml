name: Daily Full Holder Scan

on:
  schedule:
    # Run once daily at 06:00 UTC (full transfer scan + fresh detection)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  full-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch holder data from Etherscan + Alchemy fallback
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: python fetch_holders.py

      - name: Merge with existing data (preserve labels)
        run: python update_data.py

      - name: Auto-detect fresh wallets (<30 days old)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python detect_fresh.py

      - name: Generate real flow data from on-chain transfers
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python generate_flows.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet zro_data.json holders_multichain.json scan_state.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zro_data.json holders_multichain.json scan_state.json
          git commit -m "📊 Daily holder scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push
