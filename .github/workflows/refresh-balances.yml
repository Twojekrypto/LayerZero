name: Hourly Balance Refresh

on:
  schedule:
    # Run every hour
    - cron: '15 * * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh top 500 balances + watch Token Unlocks
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python refresh_balances.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet zro_data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zro_data.json
          git commit -m "🔄 Hourly balance refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push
