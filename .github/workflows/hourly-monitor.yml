name: Hourly Monitor

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  hourly:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- 1. Balance refresh (top 500 + Token Unlocks watch) ---
      - name: Refresh top 500 balances + watch Token Unlocks
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ETHERSCAN_API_KEY_2: ${{ secrets.ETHERSCAN_API_KEY_2 }}
        run: python refresh_balances.py

      # --- 2. Coinbase Prime transfer monitor ---
      - name: Monitor CB Prime transfers
        continue-on-error: true
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ETHERSCAN_API_KEY_2: ${{ secrets.ETHERSCAN_API_KEY_2 }}
          DISCORD_CB_WEBHOOK_URL: ${{ secrets.DISCORD_CB_WEBHOOK_URL }}
        run: python monitor_cb_prime.py

      # --- 3. Fresh wallet detection ---
      - name: Detect fresh wallets
        continue-on-error: true
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ETHERSCAN_API_KEY_2: ${{ secrets.ETHERSCAN_API_KEY_2 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python detect_fresh.py

      # --- 4. Whale transfer monitor (100K+ ZRO) ---
      - name: Monitor whale transfers
        continue-on-error: true
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ETHERSCAN_API_KEY_2: ${{ secrets.ETHERSCAN_API_KEY_2 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor_whale_transfers.py

      # --- Commit all changes in one push ---
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet zro_data.json cb_monitor_state.json fresh_cache.json whale_monitor_state.json 2>/dev/null && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zro_data.json cb_monitor_state.json fresh_cache.json whale_monitor_state.json
          git commit -m "🔄 Hourly monitor $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin master
          git push
