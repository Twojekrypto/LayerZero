<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Official LayerZero "broken zero" logo recreation -->
  <!-- Two disconnected strokes forming a zero/pill shape with diagonal gap -->
  <g transform="translate(100,100)">
    <!-- Top-right stroke: starts from top, goes right and down -->
    <path d="M -8,-62 
             C -8,-62 -30,-62 -30,-62
             C -47,-62 -62,-47 -62,-30
             L -62,20"
          stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Bottom-left stroke: starts from bottom, goes left and up -->
    <path d="M 8,62 
             C 8,62 30,62 30,62
             C 47,62 62,47 62,30
             L 62,-20"
          stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>
</svg>
